<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Lab Scheduler</title>
<style>
  :root{--bg:#0b1419;--panel:#111f27;--panel2:#16272f;--border:rgba(255,255,255,0.08);
    --text:#e6edf0;--text2:#8ea0a8;--accent:#2ad2c9;--red:#ff6b6b;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{width:100%;max-width:360px}
  .brand{text-align:center;margin-bottom:24px}
  .brand h1{font-size:24px;font-weight:800}.brand h1 span{color:var(--accent)}
  .brand .t{color:var(--text2);font-size:12px;margin-top:4px;letter-spacing:1px;text-transform:uppercase}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px}
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:6px}
  input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;
    color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
  input:focus{border-color:var(--accent)}
  button{width:100%;background:var(--accent);color:#00211f;border:none;border-radius:8px;padding:11px;
    font-size:14px;font-weight:800;cursor:pointer}
  .error{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);color:var(--red);
    border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px}
  .msg{background:rgba(42,210,201,0.1);border:1px solid rgba(42,210,201,0.3);color:var(--accent);
    border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1><span>Lab</span> Scheduler</h1>
      <div class="t">Admin Console</div>
    </div>
    <div class="card">
      {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="{{ rp }}{{ admin_path }}/login">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
