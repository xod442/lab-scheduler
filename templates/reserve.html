<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve a Lab — HPE Aruba Networking</title>
<style>
  :root{--bg:#0b1419;--panel:#111f27;--panel2:#16272f;--border:rgba(255,255,255,0.08);
    --text:#e6edf0;--text2:#8ea0a8;--accent:#2ad2c9;--amber:#ff8d6d;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;font-size:14px}
  a{color:var(--accent);text-decoration:none}
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 28px;background:linear-gradient(180deg,#12242d,#0e1c23);border-bottom:1px solid var(--border)}
  .topbar .brand{font-weight:800;font-size:17px}.topbar .brand span{color:var(--accent)}
  .topbar a.back{color:var(--text2);font-size:13px}.topbar a.back:hover{color:var(--text)}
  .wrap{max-width:560px;margin:0 auto;padding:28px 24px}
  h1{font-size:24px;font-weight:800;letter-spacing:-0.4px;margin-bottom:4px}
  .sub{color:var(--text2);font-size:13px;margin-bottom:22px}
  .simbadge{display:inline-block;background:rgba(255,141,109,0.12);border:1px solid rgba(255,141,109,0.35);color:var(--amber);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px}
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin:0 0 6px}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:70px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .btn{background:var(--accent);color:#00211f;border:none;border-radius:9px;padding:12px 26px;font-size:14px;font-weight:800;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn-sec{background:transparent;color:var(--text2);border:1px solid var(--border);padding:12px 20px;border-radius:9px;font-weight:700;font-size:14px}
  .row{display:flex;gap:10px;align-items:center;margin-top:6px}
  .selinfo{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:13px}
  .selinfo b{color:var(--text)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span>Lab</span> Scheduler</div>
  <a class="back" href="{{ rp }}/schedule">← Back to calendar</a>
</div>

<div class="wrap">
  <h1>Reserve a lab session {% if not live %}<span class="simbadge">SIMULATED</span>{% endif %}</h1>
  <div class="sub">Fill in the details below and submit to book your seat.</div>

  {% if title %}
  <div class="selinfo">Selected: <b>{{ title }}</b>{% if code %} ({{ code }}){% endif %}</div>
  {% endif %}

  <div class="card">
    <form method="post" action="{{ rp }}/reserve">
      <label for="courseCode">Course code</label>
      <input type="text" id="courseCode" name="courseCode" value="{{ code }}" required>

      <div class="grid2">
        <div>
          <label for="startDateTime">Start</label>
          <input type="datetime-local" id="startDateTime" name="startDateTime" value="{{ start }}" required>
        </div>
        <div>
          <label for="endDateTime">End</label>
          <input type="datetime-local" id="endDateTime" name="endDateTime" value="{{ end }}" required>
        </div>
      </div>

      <label for="tz">Time zone</label>
      <select id="tz" name="tz">
        {% for z in tz_choices %}<option value="{{ z }}">{{ z }}</option>{% endfor %}
      </select>

      <label for="userId">Your email</label>
      <input type="email" id="userId" name="userId" placeholder="you@company.com" required>

      <label for="numStudents">Number of students</label>
      <input type="number" id="numStudents" name="numStudents" value="1" min="1" max="50" required>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" name="notes" placeholder="Anything the lab team should know…"></textarea>

      <div class="row">
        <button class="btn" type="submit">Reserve this lab →</button>
        <a class="btn-sec" href="{{ rp }}/schedule">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
